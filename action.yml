name: "setup-atmos"
description: "A GitHub Action to setup the Atmos CLI"
author: hello@cloudposse.com
branding:
  icon: "terminal"
  color: "blue"
inputs:
  atmos-version:
    description: "Version Spec of the version to use. Examples: 1.x, 10.15.1, >=10.15.0."
    default: "latest"
  atmos-version-file:
    description:
      Path to a file that declares the atmos version to use. Supports the asdf/mise `.tool-versions` format (an `atmos
      <version>` line) and a plain version file whose contents are the version (e.g. `.atmos-version`). When both
      `atmos-version` and `atmos-version-file` are set, `atmos-version` takes precedence.
    required: false
  install-wrapper:
    description:
      Flag to indicate if the wrapper script will be installed to wrap subsequent calls of the `atmos` binary and expose
      its STDOUT, STDERR, and exit code as outputs named `stdout`, `stderr`, and `exitcode` respectively. Defaults to
      `true`.
    default: "true"
    required: false
  checksum-validation:
    description:
      Controls SHA256SUMS validation. Use `warn` to validate when checksums are published and warn when they are missing,
      `enforce` to fail when checksums are missing, or `skip` to disable checksum validation. Checksum mismatches always
      fail when validation runs.
    default: "warn"
    required: false
  token:
    description:
      Used to pull atmos distributions from Cloud Posse's GitHub repository. Since there's a default, this is typically
      not supplied by the user. When running this action on github.com, the default value is sufficient. When running on
      GHES, you can pass a personal access token for github.com if you are experiencing rate limiting.
    default: ${{ github.server_url == 'https://github.com' && github.token || '' }}
outputs:
  atmos-version:
    description: "The installed atmos version."
runs:
  using: "node24"
  main: "dist/index.js"
