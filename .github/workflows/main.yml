on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: yarn

      - name: Install Dependencies
        run: yarn --frozen-lockfile --prefer-offline

      - name: Linting
        run: yarn lint:check

      - name: Format Source Code
        run: yarn format:check

      - name: Unit Tests
        run: yarn test:coverage

      - name: Build
        run: |
          yarn clean
          yarn build
          yarn build:wrapper

      - name: Verify build artifacts are committed
        run: git diff --exit-code -- dist

  integration:
    name: Integration (${{ matrix.os }}, wrapper=${{ matrix.install-wrapper }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        install-wrapper:
          - "false"
          - "true"
    steps:
      - uses: actions/checkout@v7

      - name: Setup Atmos
        uses: ./
        with:
          atmos-version: latest
          install-wrapper: ${{ matrix.install-wrapper }}

      - name: Run Atmos
        id: atmos
        run: atmos version

      - name: Verify outputs are available
        if: matrix.install-wrapper == 'true'
        run: |
          echo "stdout: ${{ steps.atmos.outputs.stdout }}"
          echo "stderr: ${{ steps.atmos.outputs.stderr }}"
          echo "exitcode: ${{ steps.atmos.outputs.exitcode }}"

  major-release-tagger:
    runs-on: ubuntu-latest
    steps:
      - uses: cloudposse/github-action-major-release-tagger@v2
        with:
          dry-run: 'true'
