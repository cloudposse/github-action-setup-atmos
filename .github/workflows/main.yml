on:
  workflow_dispatch:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: yarn

      - name: Install Dependencies
        run: yarn --frozen-lockfile --prefer-offline

      - name: Linting
        run: yarn lint:check

      - name: Format Source Code
        run: yarn format:check

      - name: Unit Tests
        run: yarn test:coverage

      - name: Build
        run: |
          yarn clean
          yarn build
          yarn build:wrapper

      - name: Commit and Push Changes
        uses: EndBug/add-and-commit@v9
        with:
          committer_name: GitHub Action
          # https://github.blog/changelog/2021-02-08-github-actions-skip-pull-request-and-push-workflows-with-skip-ci/
          message: "chore: [skip-ci] format code and generate build artifacts"

  integration:
    name: Integration (${{ matrix.os }}, wrapper=${{ matrix.install-wrapper }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        install-wrapper:
          - "false"
          - "true"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Atmos
        uses: ./
        with:
          atmos-version: latest
          install-wrapper: ${{ matrix.install-wrapper }}

      - name: Run Atmos
        id: atmos
        run: atmos version

      - name: Verify outputs are available
        if: matrix.install-wrapper == 'true'
        run: |
          echo "stdout: ${{ steps.atmos.outputs.stdout }}"
          echo "stderr: ${{ steps.atmos.outputs.stderr }}"
          echo "exitcode: ${{ steps.atmos.outputs.exitcode }}"

  major-release-tagger:
    runs-on: ubuntu-latest
    steps:
      - uses: cloudposse/github-action-major-release-tagger@v1
        with:
          dry-run: 'true'
