on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: yarn

      - name: Install Dependencies
        run: yarn --frozen-lockfile --prefer-offline

      - name: Linting
        run: yarn lint:check

      - name: Format Source Code
        run: yarn format:check

      - name: Unit Tests
        run: yarn test:coverage

      - name: Build
        run: |
          yarn clean
          yarn build
          yarn build:wrapper

      - name: Verify build artifacts are committed
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet -- dist; then
            echo "::error::Generated dist artifacts are stale. Run 'yarn clean && yarn build && yarn build:wrapper' and commit dist/."
            git diff --name-only -- dist
            exit 1
          fi

      - name: Commit and push generated build artifacts
        if: github.event_name != 'pull_request' && github.ref_type == 'branch'
        run: |
          if git diff --quiet -- dist; then
            echo "No generated build artifact changes."
            exit 0
          fi

          git config user.name "GitHub Action"
          git config user.email "actions@github.com"
          git add dist
          git commit -m "chore: [skip-ci] generate build artifacts"
          git push origin "HEAD:${GITHUB_REF_NAME}"

  integration:
    name: Integration (${{ matrix.os }}, wrapper=${{ matrix.install-wrapper }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        install-wrapper:
          - "false"
          - "true"
    steps:
      - uses: actions/checkout@v7

      - name: Setup Atmos
        uses: ./
        with:
          atmos-version: latest
          install-wrapper: ${{ matrix.install-wrapper }}

      - name: Run Atmos
        id: atmos
        run: atmos version

      - name: Verify outputs are available
        if: matrix.install-wrapper == 'true'
        run: |
          echo "stdout: ${{ steps.atmos.outputs.stdout }}"
          echo "stderr: ${{ steps.atmos.outputs.stderr }}"
          echo "exitcode: ${{ steps.atmos.outputs.exitcode }}"

  major-release-tagger:
    runs-on: ubuntu-latest
    steps:
      - uses: cloudposse/github-action-major-release-tagger@v2
        with:
          dry-run: 'true'
